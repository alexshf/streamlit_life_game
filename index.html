<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Stlite Demo - Game_life</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.2.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.90.3/build/stlite.js"
      mount(
            {
              requirements: ["opencv-python"],
              entrypoint: "cv_stream.py"
              files: {"cv_stream.py", "./cv_stream.py"}
            },
            document.getElementById("root")
              )
     </script>
  </body>
</html>
